<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Village Villa Gallery</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h1>Village Villa</h1>

        <p>Photo Gallery</p>

    </header>



    <!-- Gallery -->

   <!-- Action Buttons -->

<div class="top-actions">

    <button id="selectBtn">
        <i class="fa-solid fa-check"></i>
        Select Photos
    </button>

    <button id="shareSelectedBtn" style="display:none;">
        <i class="fa-brands fa-whatsapp"></i>
        Share Selected
    </button>

</div>

<!-- Gallery -->

<section class="gallery">

    <div class="photo">
        <input type="checkbox" class="selectBox">
        <img src="home.png" alt="">
    </div>

    <div class="photo">
        <input type="checkbox" class="selectBox">
        <img src="bed1.jpg" alt="">
    </div>

    <div class="photo">
        <input type="checkbox" class="selectBox">
        <img src="bed2.jpg" alt="">
    </div>

    <div class="photo">
        <input type="checkbox" class="selectBox">
        <img src="bath.jpg" alt="">
    </div>

    <div class="photo">
        <input type="checkbox" class="selectBox">
        <img src="dinning.jpg" alt="">
    </div>

</section>
    </section>



    <!-- Full Screen Viewer -->

    <div class="viewer">

        <span class="close">

            <i class="fa-solid fa-xmark"></i>

        </span>

        <img id="viewerImg">

        <button class="prev">

            <i class="fa-solid fa-chevron-left"></i>

        </button>

        <button class="next">

            <i class="fa-solid fa-chevron-right"></i>

        </button>



        <button class="shareBtn">

            <i class="fa-brands fa-whatsapp"></i>

            Share

        </button>

    </div>



    <script src="script.js"></script>

</body>

</html>
